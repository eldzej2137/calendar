version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: calendar-postgres
    environment:
      POSTGRES_DB: calendardb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-defaultpassword123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - calendar-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calendar-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/calendardb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-defaultpassword123}
    ports:
      - "8080:8080"
    networks:
      - calendar-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  calendar-network:
    driver: bridge
